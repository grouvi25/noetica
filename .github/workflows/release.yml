name: release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  # Cheap and platform-agnostic — runs lint + tests on the smallest
  # available runner so analyzer regressions are caught even when the
  # APK / Windows builders are stuck on a flaky hosted runner.
  analyze:
    name: Lint + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.8'
          channel: stable

      - run: flutter pub get
      # --no-fatal-infos: Flutter 3.27+ marks `withOpacity`, `activeThumbColor`,
      # etc. as info-level deprecations. Those don't break the app and we don't
      # want a single-line cleanup PR on every Flutter bump to be a CI gate.
      - run: flutter analyze --no-fatal-infos
      - run: flutter test

  android-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.8'
          channel: stable

      - name: flutter pub get (with retry on hosted-runner flake)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 15
          command: flutter pub get

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
          cat <<EOF > android/key.properties
          storeFile=release.keystore
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Build APK (release)
        env:
          GOOGLE_OAUTH_WEB_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_WEB_CLIENT_ID }}
          NOETICA_BACKEND_URL: ${{ secrets.NOETICA_BACKEND_URL }}
        # The bulk of past Android-job failures on this repo were
        # transient hosted-runner errors ("The job was not acquired by
        # Runner of type hosted even after multiple attempts"), not
        # actual build failures. We retry the gradle build once before
        # surfacing as a real failure so a single flake doesn't turn the
        # PR red.
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 25
          max_attempts: 2
          retry_wait_seconds: 30
          command: |
            ARGS=()
            if [ -n "$GOOGLE_OAUTH_WEB_CLIENT_ID" ]; then
              ARGS+=("--dart-define=GOOGLE_OAUTH_WEB_CLIENT_ID=$GOOGLE_OAUTH_WEB_CLIENT_ID")
            fi
            if [ -n "$NOETICA_BACKEND_URL" ]; then
              ARGS+=("--dart-define=NOETICA_BACKEND_URL=$NOETICA_BACKEND_URL")
            fi
            flutter build apk --release "${ARGS[@]}"

      - uses: actions/upload-artifact@v4
        with:
          name: noetica-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Attach APK to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk

  windows-installer:
    name: Build Windows installer
    runs-on: windows-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.8'
          channel: stable

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - run: flutter pub get

      - name: Build Windows (release)
        shell: bash
        env:
          GOOGLE_OAUTH_DESKTOP_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_DESKTOP_CLIENT_ID }}
          GOOGLE_OAUTH_DESKTOP_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_DESKTOP_CLIENT_SECRET }}
          NOETICA_BACKEND_URL: ${{ secrets.NOETICA_BACKEND_URL }}
        run: |
          ARGS=()
          if [ -n "$GOOGLE_OAUTH_DESKTOP_CLIENT_ID" ]; then
            ARGS+=("--dart-define=GOOGLE_OAUTH_DESKTOP_CLIENT_ID=$GOOGLE_OAUTH_DESKTOP_CLIENT_ID")
          fi
          if [ -n "$GOOGLE_OAUTH_DESKTOP_CLIENT_SECRET" ]; then
            ARGS+=("--dart-define=GOOGLE_OAUTH_DESKTOP_CLIENT_SECRET=$GOOGLE_OAUTH_DESKTOP_CLIENT_SECRET")
          fi
          if [ -n "$NOETICA_BACKEND_URL" ]; then
            ARGS+=("--dart-define=NOETICA_BACKEND_URL=$NOETICA_BACKEND_URL")
          fi
          flutter build windows --release "${ARGS[@]}"

      - name: Compile Inno Setup installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.6
        with:
          path: windows/installer/setup.iss
          options: /O+

      - uses: actions/upload-artifact@v4
        with:
          name: noetica-windows-installer
          path: windows/installer/Output/*.exe

      - name: Attach installer to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: windows/installer/Output/*.exe
