name: noetica
description: "Noetica — second brain, growth tracker, memoir."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  sqflite: ^2.3.3+1
  sqflite_common_ffi: ^2.3.3
  sqflite_common_ffi_web: ^0.4.5
  path_provider: ^2.1.4
  path: ^1.9.0
  uuid: ^4.5.1
  intl: '>=0.19.0 <1.0.0'
  shared_preferences: ^2.3.2
  google_fonts: ^6.2.1
  http: ^1.2.2
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  flutter_timezone: ^3.0.1
  google_sign_in: ^6.2.1
  googleapis_auth: ^1.6.0
  flutter_secure_storage: ^9.2.2
  url_launcher: ^6.3.1
  local_notifier: ^0.1.6
  tray_manager: ^0.2.3
  window_manager: ^0.4.2
  launch_at_startup: ^0.3.1
  package_info_plus: ^8.0.2
  audioplayers: ^6.1.0
  flutter_markdown: ^0.7.4
  markdown: ^7.2.2


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/branding/
    - assets/sounds/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/branding/tray_icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/branding/tray_icon.png"
  windows:
    generate: true
    image_path: "assets/branding/tray_icon.png"
    icon_size: 256

flutter_native_splash:
  color: "#000000"
  image: "assets/branding/splash_icon.png"
  android: true
  ios: false
  web: false
  android_12:
    color: "#000000"
    image: "assets/branding/splash_icon.png"
    icon_background_color: "#000000"
